<!DOCTYPE html>
<html>
<head>

<title>Quadron AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/compromise"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#07090f;
color:#00eaff;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

h1{
letter-spacing:4px;
margin-top:10px;
}

#chat{
width:92%;
max-width:900px;
height:55vh;
background:#0b0f1c;
border-radius:10px;
border:1px solid #00eaff;
padding:12px;
overflow-y:auto;
}

.message{margin:8px 0}

.user{color:white}
.bot{color:#00eaff}

#controls{
width:92%;
max-width:900px;
display:flex;
gap:6px;
margin-top:10px;
}

input{
flex:1;
padding:12px;
background:#0b0f1c;
border:1px solid #00eaff;
color:white;
}

button{
padding:10px 14px;
background:#00eaff;
border:none;
cursor:pointer;
}

/* popup */

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

#popupBox{
background:#111;
color:white;
padding:25px;
border-radius:10px;
width:340px;
text-align:center;
}

/* quadron7 */

#quadron7{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
flex-direction:column;
align-items:center;
overflow:hidden;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

#chat7{
width:92%;
max-width:900px;
height:55vh;
background:rgba(0,0,0,.6);
border:1px solid white;
padding:10px;
overflow-y:auto;
z-index:2;
}

</style>
</head>

<body>

<h1>QUADRON</h1>

<div id="chat"></div>

<div id="controls">

<input id="input" placeholder="Ask Quadron">

<button onclick="send()">Send</button>

<button onclick="voiceInput()">🎤</button>

<button onclick="openPopup()">Quadron 7</button>

</div>

<!-- popup -->

<div id="popup">

<div id="popupBox">

<h3>Quadron 7 Experimental Mode</h3>

<p>
Quadron 7 is an experimental intelligence with stronger sarcasm
and internet-powered responses.
</p>

<p>
Responses are AI-generated and may be humorous or imperfect.
</p>

<button onclick="enterQ7()">Continue</button>

</div>

</div>

<!-- quadron7 -->

<div id="quadron7">

<h1 style="z-index:2">QUADRON 7</h1>

<div id="chat7"></div>

<div id="controls" style="z-index:2">

<input id="input7">

<button onclick="send7()">Send</button>

<button onclick="voiceInput7()">🎤</button>

</div>

</div>

<script>

/* memory */

let memory=[];
let usedReplies=[];

/* utilities */

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* keyword extraction */

function extractKeywords(text){

let doc=nlp(text);

let nouns=doc.nouns().out('array');

return nouns.slice(0,3);

}

/* topic detection */

function detectTopic(text){

text=text.toLowerCase();

if(text.includes("elon")||text.includes("tesla"))
return "technology";

if(text.includes("space"))
return "space";

if(text.includes("ai"))
return "ai";

return "general";

}

/* internet search */

async function searchWeb(query){

try{

let url="https://api.allorigins.win/raw?url="+
encodeURIComponent(
"https://api.duckduckgo.com/?q="+query+"&format=json"
);

let res=await fetch(url);

let data=await res.json();

if(data.AbstractText)
return data.AbstractText;

return null;

}catch{

return null;

}

}

/* sarcasm layer */

function sarcasm(){

let lines=[
"Interesting question.",
"Curiosity detected.",
"That idea has potential.",
"Your logic pathway is unusual."
];

return random(lines);

}

/* repetition shield */

function unique(text){

if(usedReplies.includes(text)){

text+=" Let's explore a different angle.";

}

usedReplies.push(text);

if(usedReplies.length>20)
usedReplies.shift();

return text;

}

/* generator */

async function generate(msg){

let keywords=extractKeywords(msg);

let fact=await searchWeb(msg);

let reply;

if(fact){

reply=sarcasm()+" "+fact;

}else{

reply=sarcasm()+" "+keywords.join(" ")+" connects to broader ideas.";

}

reply=unique(reply);

return reply;

}

/* typing */

function typeText(el,text){

let words=text.split(" ");

let i=0;

function type(){

if(i<words.length){

el.textContent+=words[i]+" ";

i++;

setTimeout(type,40);

}

}

type();

}

/* voice */

function speak(t){

let u=new SpeechSynthesisUtterance(t);

u.rate=1;

speechSynthesis.speak(u);

}

/* chat add */

function add(text,type){

let chat=document.getElementById("chat");

let d=document.createElement("div");

d.className="message "+type;

d.textContent=text;

chat.appendChild(d);

chat.scrollTop=chat.scrollHeight;

return d;

}

/* send */

async function send(){

let input=document.getElementById("input");

let msg=input.value.trim();

if(!msg) return;

add("You: "+msg,"user");

input.value="";

let reply=await generate(msg);

let bot=add("Quadron: ","bot");

setTimeout(()=>{

typeText(bot,reply);

speak(reply);

},300);

memory.push(msg);

}

/* voice input */

function voiceInput(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

let rec=new SpeechRecognition();

rec.onresult=function(e){

document.getElementById("input").value=e.results[0][0].transcript;

send();

};

rec.start();

}

/* popup */

function openPopup(){

document.getElementById("popup").style.display="flex";

}

function enterQ7(){

document.getElementById("popup").style.display="none";

document.getElementById("quadron7").style.display="flex";

createStars();

}

/* stars */

function createStars(){

for(let i=0;i<200;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDuration=(1+Math.random()*3)+"s";

document.getElementById("quadron7").appendChild(s);

}

}

/* quadron7 send */

async function send7(){

let input=document.getElementById("input7");

let msg=input.value;

let chat=document.getElementById("chat7");

let u=document.createElement("div");

u.textContent="You: "+msg;

chat.appendChild(u);

let reply=await generate(msg);

let b=document.createElement("div");

b.textContent="Quadron7: "+reply;

chat.appendChild(b);

speak(reply);

input.value="";

}

/* enter key */

document.getElementById("input").addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
