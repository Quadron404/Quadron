<!DOCTYPE html>
<html>

<head>

<title>Quadron AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/compromise"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
background:#07090f;
color:#00eaff;
font-family:Arial;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

h1{
margin-top:10px;
letter-spacing:4px;
}

#chat{
width:92%;
max-width:900px;
height:55vh;
background:#0c0f1c;
border-radius:10px;
border:1px solid #00eaff;
padding:12px;
overflow-y:auto;
}

.message{margin:8px 0;}

.user{color:white;}

.bot{color:#00eaff;}

#controls{
width:92%;
max-width:900px;
display:flex;
gap:6px;
margin-top:8px;
}

input{
flex:1;
padding:12px;
background:#0c0f1c;
border:1px solid #00eaff;
color:white;
}

button{
padding:10px 14px;
background:#00eaff;
border:none;
cursor:pointer;
}

#voicePanel{
margin-top:10px;
display:flex;
gap:3px;
height:30px;
}

.bar{
width:4px;
background:#00eaff;
animation:voice 1s infinite ease-in-out;
}

@keyframes voice{
0%{height:5px;}
50%{height:30px;}
100%{height:5px;}
}

/* popup */

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

#popupBox{
background:#111;
color:white;
padding:25px;
border-radius:10px;
width:340px;
text-align:center;
}

/* quadron7 */

#quadron7{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
flex-direction:column;
align-items:center;
}

#stars{
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:stars 60s linear infinite;
opacity:.6;
}

@keyframes stars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

#chat7{
width:92%;
max-width:900px;
height:55vh;
background:rgba(0,0,0,.6);
border:1px solid white;
padding:10px;
overflow-y:auto;
z-index:2;
}

</style>

</head>

<body>

<h1>QUADRON</h1>

<div id="chat"></div>

<div id="controls">

<input id="input" placeholder="Ask Quadron...">

<button onclick="send()">Send</button>

<button onclick="voiceInput()">🎤</button>

<button onclick="openPopup()">Quadron 7</button>

</div>

<div id="voicePanel">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<!-- popup -->

<div id="popup">

<div id="popupBox">

<h3>Quadron 7 Experimental Mode</h3>

<p>
Quadron 7 is an advanced experimental intelligence with stronger humor
and experimental responses.
</p>

<p>
By continuing you agree responses are AI-generated and for entertainment.
</p>

<button onclick="enterQ7()">Agree</button>

</div>

</div>

<!-- quadron7 -->

<div id="quadron7">

<div id="stars"></div>

<h1 style="z-index:2">QUADRON 7</h1>

<div id="chat7"></div>

<div id="controls" style="z-index:2">

<input id="input7">

<button onclick="send7()">Send</button>

<button onclick="voiceInput7()">🎤</button>

</div>

</div>

<script>

let memory=[];
let lastReplies=[];

function random(a){return a[Math.floor(Math.random()*a.length)]}

/* keyword extraction */

function extractKeywords(text){

let doc=nlp(text);

let nouns=doc.nouns().out('array');

let verbs=doc.verbs().out('array');

return nouns.concat(verbs);

}

/* response generator */

function generateResponse(text){

let keys=extractKeywords(text);

let open=[
"Analyzing",
"Processing",
"Evaluating",
"Considering"
];

let humor=[
"interesting logic detected",
"humans think creatively sometimes",
"this question is unusual",
"this idea is intriguing"
];

let resp=random(open)+" "+keys.join(" ")+" — "+random(humor)+".";

if(lastReplies.includes(resp)){
resp=random(open)+" "+random(humor);
}

lastReplies.push(resp);

if(lastReplies.length>5) lastReplies.shift();

return resp;

}

/* typing effect */

function typeText(el,text){

let words=text.split(" ");
let i=0;

function type(){

if(i<words.length){

el.textContent+=words[i]+" ";

i++;

setTimeout(type,50);

}

}

type();

}

/* voice output */

function speak(t){

let s=new SpeechSynthesisUtterance(t);

s.rate=1;

speechSynthesis.speak(s);

}

/* main send */

function send(){

let input=document.getElementById("input");

let msg=input.value;

if(!msg) return;

add("You: "+msg,"user");

input.value="";

let r=generateResponse(msg);

let bot=add("Quadron: ","bot");

setTimeout(()=>{

typeText(bot,r);

speak(r);

},400);

memory.push(msg);

}

/* add chat */

function add(text,type){

let chat=document.getElementById("chat");

let div=document.createElement("div");

div.className="message "+type;

div.textContent=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

return div;

}

/* voice input */

function voiceInput(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

let rec=new SpeechRecognition();

rec.onresult=function(e){

document.getElementById("input").value=e.results[0][0].transcript;

send();

};

rec.start();

}

/* popup */

function openPopup(){

document.getElementById("popup").style.display="flex";

}

function enterQ7(){

document.getElementById("popup").style.display="none";

document.getElementById("quadron7").style.display="flex";

}

/* quadron7 */

function send7(){

let input=document.getElementById("input7");

let msg=input.value;

let chat=document.getElementById("chat7");

let u=document.createElement("div");

u.textContent="You: "+msg;

chat.appendChild(u);

let r=generateResponse(msg);

let b=document.createElement("div");

b.textContent="Quadron7: "+r;

chat.appendChild(b);

speak(r);

input.value="";

}

/* enter key */

document.getElementById("input").addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
