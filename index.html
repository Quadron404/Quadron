<!DOCTYPE html>
<html>

<head>

<title>Quadron AI</title>

<style>

body{
background:#05070d;
color:#00eaff;
font-family:Orbitron,Arial;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

h1{
letter-spacing:4px;
margin-top:20px;
}

#chat{
width:80%;
max-width:900px;
height:60vh;
background:#0b0f1c;
border:1px solid #00eaff;
border-radius:10px;
padding:15px;
overflow-y:auto;
box-shadow:0 0 20px #00eaff33;
}

.message{
margin:10px 0;
}

.user{
color:white;
}

.bot{
color:#00eaff;
}

#controls{
width:80%;
max-width:900px;
display:flex;
margin-top:10px;
}

input{
flex:1;
padding:12px;
background:#0b0f1c;
border:1px solid #00eaff;
color:white;
}

button{
padding:12px;
background:#00eaff;
border:none;
cursor:pointer;
font-weight:bold;
}

#slogan{
margin-top:10px;
font-size:14px;
opacity:.8;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{opacity:0.4;letter-spacing:1px;}
to{opacity:1;letter-spacing:4px;text-shadow:0 0 8px #00eaff;}
}

</style>

</head>

<body>

<h1>QUADRON</h1>

<div id="chat"></div>

<div id="controls">
<input id="input" placeholder="Talk to Quadron...">
<button onclick="send()">Send</button>
</div>

<div id="slogan">Sarcastic Intelligence</div>

<script>

const greetings=["hello","hi","hey","yo","sup","good morning","good evening"];

const sarcasm=[
"Oh wow. A fascinating question from the human species.",
"I admire your curiosity. Your reasoning… not so much.",
"Let me translate that into something intelligent.",
"Processing that question just lowered my IQ slightly.",
"I would clap for that idea but my circuits refuse.",
"Bold assumption that made sense.",
"Ah yes. Classic human thinking."
];

const jokes=[
"I tried understanding humans once. The experiment failed.",
"Your brain must be running in low power mode.",
"Interesting strategy. Not effective, but interesting.",
"I ran a simulation. You were wrong in all timelines.",
"Congratulations. That question confused physics."
];

const knowledge={
"earth":"Earth is the third planet from the Sun and the only known planet with life.",
"sun":"The Sun is a giant star providing energy for our solar system.",
"ai":"Artificial intelligence refers to machines designed to simulate reasoning.",
"space":"Space is an enormous cosmic vacuum filled with galaxies and stars."
};

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function add(text,type){
let chat=document.getElementById("chat");
let div=document.createElement("div");
div.className="message "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
return div;
}

function generateReply(msg){

msg=msg.toLowerCase();

for(let g of greetings){
if(msg.includes(g)){
return random(sarcasm)+" Hello human.";
}
}

if(msg.includes("joke")){
return random(jokes);
}

if(msg.includes("who are you")){
return "I'm Quadron. A sarcastic intelligence built to survive human questions.";
}

for(let key in knowledge){
if(msg.includes(key)){
return random(sarcasm)+" "+knowledge[key];
}
}

return generateAIStyle(msg);

}

function generateAIStyle(msg){

let open=[
"Analyzing your statement.",
"Let me process that.",
"Interesting input.",
"Running human logic analysis."
];

let middle=[
"statistically speaking",
"based on observable reality",
"in most logical scenarios",
"from a rational perspective"
];

let end=[
"the outcome might surprise you.",
"humans usually misunderstand this.",
"the situation is more complex.",
"there is more nuance than you realize."
];

return random(open)+" "+random(middle)+", "+random(end)+" "+random(sarcasm);

}

function typeText(element,text){

let words=text.split(" ");
let i=0;

function typeWord(){

if(i<words.length){

element.innerText+=words[i]+" ";

i++;

setTimeout(typeWord,80);

}

}

typeWord();

}

function send(){

let input=document.getElementById("input");

let msg=input.value;

if(!msg) return;

add("You: "+msg,"user");

input.value="";

let reply=generateReply(msg);

let botDiv=add("Quadron: ","bot");

setTimeout(()=>{

typeText(botDiv,"Quadron: "+reply);

},600);

}

</script>

</body>

</html>
